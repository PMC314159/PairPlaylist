<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#eee8e2">
  <title>Pair Playlist Maker</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    :root{
      --ui-bg:#ece6df;--panel:rgba(255,255,255,.76);--text:#29242e;--muted:#77707d;
      --line:rgba(61,52,68,.12);--accent:#8b789d;--accent2:#6e8196;
    }
    *{box-sizing:border-box} body{margin:0;min-height:100vh;font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:radial-gradient(circle at 10% 0,rgba(160,132,176,.2),transparent 28%),linear-gradient(180deg,#eee9e4,#e7dfd8)}
    button,input,textarea{font:inherit} button{cursor:pointer}.app{width:min(1480px,calc(100% - 24px));margin:auto;padding:18px 0 42px}
    .appbar{position:sticky;top:10px;z-index:40;display:flex;justify-content:space-between;align-items:center;gap:15px;padding:13px 16px;margin-bottom:18px;border:1px solid rgba(255,255,255,.7);border-radius:999px;background:rgba(250,247,243,.86);backdrop-filter:blur(18px);box-shadow:0 12px 34px rgba(70,60,78,.1)}
    .brand{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:850;letter-spacing:.08em}.dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2))}
    .actions{display:flex;gap:8px}.btn{min-height:42px;padding:0 16px;border:1px solid var(--line);border-radius:999px;background:white;font-weight:800}.btn.primary{border:0;color:white;background:linear-gradient(135deg,var(--accent),#756586)}
    .workspace{display:grid;grid-template-columns:360px minmax(0,1fr);gap:18px;align-items:start}
    .editor{position:sticky;top:84px;max-height:calc(100vh - 96px);overflow:auto;padding:18px;border:1px solid rgba(255,255,255,.72);border-radius:26px;background:var(--panel);backdrop-filter:blur(16px);box-shadow:0 24px 70px rgba(65,54,73,.14)}
    .editor h2{margin:0 0 5px;font-size:22px}.editor-intro{margin:0 0 17px;color:var(--muted);font-size:13px;line-height:1.55}
    details{padding:14px 0;border-top:1px solid var(--line)}details:first-of-type{border-top:0}summary{cursor:pointer;list-style:none;font-weight:850;font-size:14px}summary::-webkit-details-marker{display:none}
    .form-grid{display:grid;gap:11px;margin-top:13px}label{display:grid;gap:6px;color:#595260;font-size:12px;font-weight:760}
    input,textarea,select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:12px;outline:none;background:rgba(255,255,255,.9);color:var(--text)}textarea{min-height:84px;resize:vertical;line-height:1.55}input[type=file]{font-size:11px;padding:8px}input[type=color]{height:42px;padding:5px}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:9px}.dynamic-list{display:grid;gap:9px}.song-editor{display:grid;gap:8px;padding:10px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.48)}
    .song-editor-head{display:flex;justify-content:space-between;align-items:center;gap:8px}.song-label{font-size:11px;font-weight:850;color:var(--muted);letter-spacing:.05em}.remove-song{border:0;background:transparent;color:#a16e78;font-size:11px;font-weight:850}.story-editor-wrap{display:grid;gap:9px}.story-editor-title{font-size:12px;font-weight:850;color:#595260}.story-editor-item{display:grid;gap:8px;padding:10px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.48)}.story-editor-head{display:flex;justify-content:space-between;align-items:center}.story-editor-label{font-size:11px;font-weight:850;color:var(--muted);letter-spacing:.05em}.story-file{font-size:11px}
    .mini-btn{width:100%;min-height:37px;border:1px solid var(--line);border-radius:11px;background:rgba(255,255,255,.74);font-size:12px;font-weight:850}
    .preview-wrap{min-width:0;overflow:auto;padding:4px 4px 24px}
    .poster{--pbg:#f4eee7;--pa:#8b789d;--pa2:#6e8196;position:relative;width:1080px;min-height:1440px;margin:auto;padding:58px;overflow:hidden;border-radius:34px;color:#2c2631;background:radial-gradient(circle at 6% 2%,color-mix(in srgb,var(--pa) 24%,transparent),transparent 30%),radial-gradient(circle at 94% 20%,color-mix(in srgb,var(--pa2) 19%,transparent),transparent 26%),linear-gradient(180deg,var(--pbg),#ece4dd);box-shadow:0 28px 80px rgba(63,53,71,.18)}
    .poster-inner{position:relative;z-index:1}.poster-top{display:flex;justify-content:space-between;align-items:flex-start;gap:30px;margin-bottom:28px}.eyebrow{margin-bottom:10px;color:var(--pa);font-size:18px;font-weight:900;letter-spacing:.16em}.poster-title{margin:0;max-width:760px;font-size:86px;line-height:.98;letter-spacing:-.06em;word-break:keep-all}.poster-index{padding-top:10px;color:rgba(44,38,49,.56);font-size:16px;font-weight:850;letter-spacing:.12em;text-align:right}.poster-desc{max-width:860px;margin:0 0 38px;color:rgba(44,38,49,.72);font-size:21px;line-height:1.65;word-break:keep-all}
    .hero-collage{display:grid;grid-template-columns:1.15fr .85fr;gap:18px;margin-bottom:34px}.hero-img{position:relative;overflow:hidden;height:430px;border-radius:26px;background:#d7cfc9}.hero-img img,.person-image img{width:100%;height:100%;object-fit:cover}.story-stack{display:grid;gap:10px;height:430px}.story-block{--story-color:#8b789d;display:grid;grid-template-columns:112px minmax(0,1fr);min-height:0;overflow:hidden;border-radius:22px;background:color-mix(in srgb,var(--story-color) 12%,rgba(255,255,255,.78));border:1px solid color-mix(in srgb,var(--story-color) 30%,rgba(65,55,70,.08));box-shadow:0 10px 24px color-mix(in srgb,var(--story-color) 14%,transparent);position:relative}.story-block::after{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(120deg,transparent 0 36%,color-mix(in srgb,var(--story-color) 10%,transparent) 52%,transparent 68%);opacity:.75}.story-block.effect-glass{backdrop-filter:blur(12px);background:color-mix(in srgb,var(--story-color) 9%,rgba(255,255,255,.68))}.story-block.effect-gradient{background:linear-gradient(135deg,color-mix(in srgb,var(--story-color) 22%,#f7f2ed),color-mix(in srgb,var(--story-color) 7%,#ece6df))}.story-block.effect-dark{background:color-mix(in srgb,var(--story-color) 72%,#2f2933);color:white}.story-block.effect-dark .story-subtitle{color:rgba(255,255,255,.58)}.story-thumb{min-width:0;min-height:0;overflow:hidden;background:color-mix(in srgb,var(--story-color) 18%,#d7cfc9);position:relative;z-index:1}.story-thumb img{width:100%;height:100%;object-fit:cover}.story-thumb .placeholder{font-size:10px}.story-title-wrap{display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:16px 22px;position:relative;z-index:1}.story-subtitle{margin-bottom:5px;color:color-mix(in srgb,var(--story-color) 72%,#5f5764);font-size:10px;font-weight:900;letter-spacing:.14em}.story-title{width:100%;font-size:18px;font-weight:850;line-height:1.35;letter-spacing:-.03em;word-break:keep-all}.placeholder{display:grid;place-items:center;width:100%;height:100%;background:linear-gradient(135deg,rgba(139,120,157,.24),rgba(110,129,150,.18));color:rgba(44,38,49,.48);font-size:12px;font-weight:850;letter-spacing:.08em}
    .pair-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:34px;align-items:stretch}.person-card{display:flex;flex-direction:column;height:100%;padding:24px;border:1px solid rgba(65,55,70,.1);border-radius:25px;background:rgba(255,255,255,.54);box-shadow:0 14px 35px rgba(70,58,78,.08)}.person-head{display:grid;grid-template-columns:112px 1fr;gap:17px;align-items:center;margin-bottom:18px}.person-image{overflow:hidden;width:112px;height:112px;border-radius:22px;background:#d8d0ca}.person-kicker{color:var(--pa);font-size:13px;font-weight:850;letter-spacing:.11em}.person-name{margin:4px 0 0;font-size:34px;line-height:1.05;letter-spacing:-.04em}.person-intro{margin:0 0 20px;color:rgba(44,38,49,.68);font-size:16px;line-height:1.65;word-break:keep-all}
    .track-stack{display:grid;gap:10px;margin-top:auto}.track{display:grid;grid-template-columns:44px minmax(0,1fr);gap:12px;align-items:center;padding:10px 12px;border:1px solid rgba(65,55,70,.09);border-radius:15px;background:rgba(255,255,255,.62)}.track-no{display:grid;place-items:center;width:44px;height:44px;border-radius:12px;color:white;background:linear-gradient(135deg,var(--pa),var(--pa2));font-size:13px;font-weight:900}.track-title{overflow:hidden;font-size:15px;font-weight:850;text-overflow:ellipsis;white-space:nowrap}.track-artist{overflow:hidden;margin-top:2px;color:rgba(44,38,49,.55);font-size:12px;text-overflow:ellipsis;white-space:nowrap}
    .shared-box{padding:28px;border-radius:28px;background:rgba(40,35,45,.93);color:white;box-shadow:0 18px 40px rgba(50,42,56,.16)}.shared-head{display:flex;justify-content:space-between;align-items:end;gap:24px;margin-bottom:20px}.shared-kicker{color:#c7bad4;font-size:13px;font-weight:850;letter-spacing:.13em}.shared-title{margin:4px 0 0;font-size:38px;letter-spacing:-.04em}.shared-count{color:rgba(255,255,255,.55);font-size:13px;font-weight:750}.shared-list{display:grid}.shared-row{display:grid;grid-template-columns:42px minmax(0,1fr) 180px;gap:12px;align-items:center;padding:13px 8px;border-top:1px solid rgba(255,255,255,.08)}.shared-row:first-child{border-top:0}.shared-number{color:rgba(255,255,255,.45);font-size:13px;text-align:center}.shared-song{font-size:15px;font-weight:820}.shared-artist{overflow:hidden;color:rgba(255,255,255,.56);font-size:13px;text-align:right;text-overflow:ellipsis;white-space:nowrap}
    .poster-footer{display:flex;justify-content:space-between;gap:20px;margin-top:24px;color:rgba(44,38,49,.48);font-size:13px;font-weight:700}.footer-right{display:flex;align-items:center;gap:14px}.commission-credit{font-size:11px;font-weight:760;color:rgba(44,38,49,.6)}
    @media(max-width:980px){.workspace{grid-template-columns:1fr}.editor{position:static;max-height:none}}@media(max-width:700px){.app{width:calc(100% - 14px)}.appbar{border-radius:20px}.actions .btn:first-child{display:none}.preview-wrap{overflow:hidden}.poster{transform-origin:top left;transform:scale(calc((100vw - 28px)/1080));margin-bottom:calc(-1440px + (1440px * ((100vw - 28px)/1080)))}}
  </style>
</head>
<body>
<div class="app">
  <header class="appbar">
    <div class="brand"><span class="dot"></span>PAIR PLAYLIST MAKER</div>
    <div class="actions"><button class="btn" id="resetBtn">예시로 초기화</button><button class="btn primary" id="saveBtn">PNG로 저장</button></div>
  </header>

  <div class="workspace">
    <aside class="editor">
      <h2>플레이리스트 편집</h2>
      <p class="editor-intro">곡을 원하는 만큼 추가하거나 삭제할 수 있어. 저장 이미지에는 편집창이 포함되지 않아.</p>

      <details open><summary>전체 설정</summary><div class="form-grid">
        <label>페어 이름<input id="pairNameInput" value="MIDNIGHT HOUR"></label>
        <label>짧은 문구<input id="eyebrowInput" value="A PLAYLIST FOR TWO"></label>
        <label>페어 소개<textarea id="pairDescInput">두 사람의 시작과 변화, 서로를 이해하게 된 순간을 음악으로 기록한 플레이리스트.</textarea></label>
        <label>메인 이미지<input id="heroImageInput" type="file" accept="image/*"></label>
        <label>커미션주 이름<input id="commissionerInput" placeholder="예: 홍길동"></label>
        <div class="story-editor-wrap">
          <div class="story-editor-title">서사 블럭</div>
          <div class="dynamic-list" id="storyEditor"></div>
          <button class="mini-btn" id="addStoryBlock" type="button">＋ 서사 블럭 추가</button>
        </div>
        <div class="two-col">
          <label>배경색<input id="bgColorInput" type="color" value="#f4eee7"></label>
          <label>강조색<input id="accentColorInput" type="color" value="#8b789d"></label>
        </div>
        <label>보조 강조색<input id="accentColor2Input" type="color" value="#6e8196"></label>
      </div></details>

      <details open><summary>첫 번째 인물</summary><div class="form-grid">
        <label>이름<input id="name1Input" value="이자헌"></label>
        <label>소개<textarea id="intro1Input">백일몽 주식회사 D조 조장, 도마뱀 과장</textarea></label>
        <label>인물 이미지<input id="person1ImageInput" type="file" accept="image/*"></label>
        <div class="dynamic-list" id="person1Editor"></div>
        <button class="mini-btn" id="addPerson1Song">＋ 상징곡 추가</button>
      </div></details>

      <details><summary>두 번째 인물</summary><div class="form-grid">
        <label>이름<input id="name2Input" value="정희솔"></label>
        <label>소개<textarea id="intro2Input">백일몽 주식회사 D조 흰담비 대리, 비공식 어둠</textarea></label>
        <label>인물 이미지<input id="person2ImageInput" type="file" accept="image/*"></label>
        <div class="dynamic-list" id="person2Editor"></div>
        <button class="mini-btn" id="addPerson2Song">＋ 상징곡 추가</button>
      </div></details>

      <details><summary>공통 플레이리스트</summary><div class="form-grid">
        <label>플레이리스트 제목<input id="sharedTitleInput" value="Our Midnight Playlist"></label>
        <div class="dynamic-list" id="sharedEditor"></div>
        <button class="mini-btn" id="addSharedSong">＋ 공통곡 추가</button>
      </div></details>
    </aside>

    <section class="preview-wrap">
      <div class="poster" id="poster"><div class="poster-inner">
        <div class="poster-top"><div><div class="eyebrow" id="eyebrowPreview"></div><h1 class="poster-title" id="pairNamePreview"></h1></div><div class="poster-index">PAIR ARCHIVE<br>NO. 01</div></div>
        <p class="poster-desc" id="pairDescPreview"></p>

        <div class="hero-collage">
          <div class="hero-img" id="heroMain"><div class="placeholder">MAIN IMAGE</div></div>
          <div class="story-stack" id="storyPreview"></div>
        </div>

        <div class="pair-grid">
          <article class="person-card">
            <div class="person-head"><div class="person-image" id="person1Image"><div class="placeholder">PERSON 01</div></div><div><div class="person-kicker">CHARACTER 01</div><h2 class="person-name" id="name1Preview"></h2></div></div>
            <p class="person-intro" id="intro1Preview"></p>
            <div class="track-stack" id="person1Preview"></div>
          </article>
          <article class="person-card">
            <div class="person-head"><div class="person-image" id="person2Image"><div class="placeholder">PERSON 02</div></div><div><div class="person-kicker">CHARACTER 02</div><h2 class="person-name" id="name2Preview"></h2></div></div>
            <p class="person-intro" id="intro2Preview"></p>
            <div class="track-stack" id="person2Preview"></div>
          </article>
        </div>

        <section class="shared-box">
          <div class="shared-head"><div><div class="shared-kicker">SHARED PLAYLIST</div><h2 class="shared-title" id="sharedTitlePreview"></h2></div><div class="shared-count" id="sharedCount"></div></div>
          <div class="shared-list" id="sharedPreview"></div>
        </section>

        <div class="poster-footer"><span>PAIR PLAYLIST ARCHIVE</span><div class="footer-right"><span>made with memories & music</span><span class="commission-credit" id="commissionCredit" hidden></span></div></div>
      </div></div>
    </section>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
  const $ = id => document.getElementById(id);
  const esc = value => String(value).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");

  const bindText = (input, preview) => {
    const update = () => $(preview).textContent = $(input).value || " ";
    $(input).addEventListener("input", update); update();
  };

  [["pairNameInput","pairNamePreview"],["eyebrowInput","eyebrowPreview"],["pairDescInput","pairDescPreview"],["name1Input","name1Preview"],["intro1Input","intro1Preview"],["name2Input","name2Preview"],["intro2Input","intro2Preview"],["sharedTitleInput","sharedTitlePreview"]].forEach(x=>bindText(...x));

  const groups = {
    person1:{editor:"person1Editor",preview:"person1Preview",button:"addPerson1Song",kind:"symbol",songs:[{title:"상징곡 제목 1",artist:"아티스트 이름"},{title:"상징곡 제목 2",artist:"아티스트 이름"}]},
    person2:{editor:"person2Editor",preview:"person2Preview",button:"addPerson2Song",kind:"symbol",songs:[{title:"상징곡 제목 1",artist:"아티스트 이름"},{title:"상징곡 제목 2",artist:"아티스트 이름"}]},
    shared:{editor:"sharedEditor",preview:"sharedPreview",button:"addSharedSong",kind:"shared",songs:[{title:"공통 플레이리스트 곡 1",artist:"아티스트 이름"},{title:"공통 플레이리스트 곡 2",artist:"아티스트 이름"},{title:"공통 플레이리스트 곡 3",artist:"아티스트 이름"},{title:"공통 플레이리스트 곡 4",artist:"아티스트 이름"},{title:"공통 플레이리스트 곡 5",artist:"아티스트 이름"}]}
  };

  function renderPreview(key){
    const g=groups[key];
    if(g.kind==="shared"){
      $(g.preview).innerHTML=g.songs.map((s,i)=>`<div class="shared-row"><div class="shared-number">${String(i+1).padStart(2,"0")}</div><div class="shared-song">${esc(s.title||" ")}</div><div class="shared-artist">${esc(s.artist||" ")}</div></div>`).join("");
      $("sharedCount").textContent=`${g.songs.length} TRACK${g.songs.length===1?"":"S"}`;
    } else {
      $(g.preview).innerHTML=g.songs.map((s,i)=>`<div class="track"><div class="track-no">${String(i+1).padStart(2,"0")}</div><div><div class="track-title">${esc(s.title||" ")}</div><div class="track-artist">${esc(s.artist||" ")}</div></div></div>`).join("");
    }
  }

  function renderEditor(key){
    const g=groups[key];
    $(g.editor).innerHTML=g.songs.map((s,i)=>`<div class="song-editor">
      <div class="song-editor-head"><span class="song-label">${g.kind==="shared"?"TRACK":"SYMBOL SONG"} ${String(i+1).padStart(2,"0")}</span><button class="remove-song" data-index="${i}">삭제</button></div>
      <input class="song-title-input" data-index="${i}" value="${esc(s.title)}" placeholder="곡 제목">
      <input class="song-artist-input" data-index="${i}" value="${esc(s.artist)}" placeholder="아티스트">
    </div>`).join("");

    $(g.editor).querySelectorAll(".song-title-input").forEach(el=>el.addEventListener("input",e=>{g.songs[+e.target.dataset.index].title=e.target.value;renderPreview(key)}));
    $(g.editor).querySelectorAll(".song-artist-input").forEach(el=>el.addEventListener("input",e=>{g.songs[+e.target.dataset.index].artist=e.target.value;renderPreview(key)}));
    $(g.editor).querySelectorAll(".remove-song").forEach(el=>el.addEventListener("click",()=>{
      if(g.songs.length<=1){alert("최소 한 곡은 남겨야 해.");return}
      g.songs.splice(+el.dataset.index,1);renderEditor(key);renderPreview(key);
    }));
  }

  Object.entries(groups).forEach(([key,g])=>{
    renderEditor(key);renderPreview(key);
    $(g.button).addEventListener("click",()=>{
      const n=g.songs.length+1;
      g.songs.push({title:g.kind==="shared"?`공통 플레이리스트 곡 ${n}`:`상징곡 제목 ${n}`,artist:"아티스트 이름"});
      renderEditor(key);renderPreview(key);
    });
  });

  function bindImage(inputId,targetId,alt){
    $(inputId).addEventListener("change",()=>{
      const file=$(inputId).files?.[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=e=>{const target=$(targetId);target.querySelector("img")?.remove();target.querySelector(".placeholder")?.remove();const img=document.createElement("img");img.src=e.target.result;img.alt=alt;target.prepend(img)};
      reader.readAsDataURL(file);
    });
  }
  bindImage("heroImageInput","heroMain","메인 이미지");bindImage("person1ImageInput","person1Image","첫 번째 인물");bindImage("person2ImageInput","person2Image","두 번째 인물");


  const storyBlocks = [
    {title:"첫 번째 서사",image:"",color:"#8b789d",effect:"soft"},
    {title:"두 번째 서사",image:"",color:"#6e8196",effect:"gradient"},
    {title:"세 번째 서사",image:"",color:"#9a7f87",effect:"glass"}
  ];

  function renderStoryPreview(){
    $("storyPreview").style.gridTemplateRows=`repeat(${storyBlocks.length},minmax(0,1fr))`;
    $("storyPreview").innerHTML=storyBlocks.map((story,i)=>`
      <div class="story-block effect-${story.effect}" style="--story-color:${story.color}">
        <div class="story-thumb">${story.image?`<img src="${story.image}" alt="서사 ${i+1} 이미지">`:`<div class="placeholder">TIMELINE ${String(i+1).padStart(2,"0")}</div>`}</div>
        <div class="story-title-wrap"><div class="story-subtitle">TIMELINE ${String(i+1).padStart(2,"0")}</div><div class="story-title">${esc(story.title||" ")}</div></div>
      </div>`).join("");
  }

  function renderStoryEditor(){
    $("storyEditor").innerHTML=storyBlocks.map((story,i)=>`
      <div class="story-editor-item">
        <div class="story-editor-head"><span class="story-editor-label">TIMELINE ${String(i+1).padStart(2,"0")}</span><button class="remove-song remove-story" data-index="${i}" type="button">삭제</button></div>
        <input class="story-title-input" data-index="${i}" value="${esc(story.title)}" placeholder="서사 제목">
        <div class="two-col">
          <label>블럭 색상<input class="story-color-input" data-index="${i}" type="color" value="${story.color}"></label>
          <label>효과<select class="story-effect-input" data-index="${i}"><option value="soft" ${story.effect==="soft"?"selected":""}>은은하게</option><option value="glass" ${story.effect==="glass"?"selected":""}>글래스</option><option value="gradient" ${story.effect==="gradient"?"selected":""}>그라데이션</option><option value="dark" ${story.effect==="dark"?"selected":""}>다크</option></select></label>
        </div>
        <input class="story-file" data-index="${i}" type="file" accept="image/*">
      </div>`).join("");

    $("storyEditor").querySelectorAll(".story-title-input").forEach(el=>el.addEventListener("input",e=>{
      storyBlocks[+e.target.dataset.index].title=e.target.value;
      renderStoryPreview();
    }));

    $("storyEditor").querySelectorAll(".story-color-input").forEach(el=>el.addEventListener("input",e=>{
      storyBlocks[+e.target.dataset.index].color=e.target.value;
      renderStoryPreview();
    }));

    $("storyEditor").querySelectorAll(".story-effect-input").forEach(el=>el.addEventListener("change",e=>{
      storyBlocks[+e.target.dataset.index].effect=e.target.value;
      renderStoryPreview();
    }));

    $("storyEditor").querySelectorAll(".story-file").forEach(el=>el.addEventListener("change",e=>{
      const file=e.target.files?.[0]; if(!file)return;
      const index=+e.target.dataset.index;
      const reader=new FileReader();
      reader.onload=event=>{storyBlocks[index].image=event.target.result;renderStoryPreview();};
      reader.readAsDataURL(file);
    }));

    $("storyEditor").querySelectorAll(".remove-story").forEach(el=>el.addEventListener("click",()=>{
      if(storyBlocks.length<=3){alert("서사 블럭은 최소 3개가 필요해.");return;}
      storyBlocks.splice(+el.dataset.index,1);
      renderStoryEditor();renderStoryPreview();
    }));
  }

  $("addStoryBlock").addEventListener("click",()=>{
    storyBlocks.push({title:`${storyBlocks.length+1}번째 서사`,image:"",color:"#8b789d",effect:"soft"});
    renderStoryEditor();renderStoryPreview();
  });

  renderStoryEditor();
  renderStoryPreview();

  $("commissionerInput").addEventListener("input",()=>{const name=$("commissionerInput").value.trim();$("commissionCredit").textContent=name?`© ${name}`:"";$("commissionCredit").hidden=!name});
  $("bgColorInput").addEventListener("input",e=>$("poster").style.setProperty("--pbg",e.target.value));
  $("accentColorInput").addEventListener("input",e=>$("poster").style.setProperty("--pa",e.target.value));
  $("accentColor2Input").addEventListener("input",e=>$("poster").style.setProperty("--pa2",e.target.value));

  $("saveBtn").addEventListener("click",async()=>{
    const btn=$("saveBtn"),old=btn.textContent;btn.textContent="저장 중…";btn.disabled=true;
    try{
      await document.fonts.ready;
      const canvas=await html2canvas($("poster"),{scale:2,useCORS:true,backgroundColor:null,logging:false,width:$("poster").offsetWidth,height:$("poster").scrollHeight,windowWidth:1400,windowHeight:$("poster").scrollHeight+200});
      const a=document.createElement("a");const name=($("pairNameInput").value||"pair-playlist").trim().replace(/[\\/:*?"<>|]/g,"-");a.download=`${name}-playlist.png`;a.href=canvas.toDataURL("image/png");a.click();
    }catch(err){console.error(err);alert("이미지 저장 중 문제가 생겼어. 다시 시도해줘.")}finally{btn.textContent=old;btn.disabled=false}
  });
  $("resetBtn").addEventListener("click",()=>{if(confirm("입력한 내용을 예시 상태로 되돌릴까?"))location.reload()});
</script>
</body>
</html>
